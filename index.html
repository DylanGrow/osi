<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSI Model Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="star-canvas"></canvas>

  <div id="game-container">
    <h1>OSI Model Quiz</h1>

    <!-- Progress row: layer badge + progress bar -->
    <div class="progress-row">
      <h2 id="layer-display">Layer: 1</h2>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>

    <div id="question-container">
      <p id="question">Loading question...</p>
      <div id="options"></div>
    </div>

    <p id="feedback"></p>
  </div>

  <script src="app.js"></script>

  <!-- Star field animation -->
  <script>
  (function() {
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const N = 160;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = Array.from({ length: N }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        alpha: Math.random() * 0.6 + 0.15,
        speed: Math.random() * 0.25 + 0.05,
        twinkleSpeed: Math.random() * 0.008 + 0.003,
        twinkleDir: Math.random() > 0.5 ? 1 : -1,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.alpha += s.twinkleSpeed * s.twinkleDir;
        if (s.alpha > 0.85 || s.alpha < 0.08) s.twinkleDir *= -1;
        s.y -= s.speed;
        if (s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${Math.random() > 0.85 ? '0,229,255' : '200,235,255'},${s.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    resize();
    initStars();
    draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
  })();
  </script>

</body>
</html>
