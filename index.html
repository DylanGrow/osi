<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Test your knowledge of the OSI Model with this interactive AI-powered quiz. Master all 7 layers from Physical to Application.">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src https://dark-hall-6deb.dylangrow.workers.dev; img-src 'self' data:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <title>OSI Model Quiz — Master All 7 Layers</title>
</head>
<body>

  <canvas id="star-canvas" aria-hidden="true"></canvas>

  <main id="game-container">
    <header class="quiz-header">
      <h1>OSI Model Quiz</h1>
      <p class="subtitle">Master the 7 Layers</p>
    </header>

    <div class="progress-row">
      <h2 id="layer-display" aria-live="polite">Layer: 1</h2>
      <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="7" aria-valuenow="1" aria-label="Layer progress" id="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>

    <section id="question-container" aria-label="Current question">
      <p id="question" aria-live="polite">Loading connection...</p>
      <div id="options" role="group" aria-label="Answer options"></div>
    </section>

    <p id="feedback" role="alert" aria-live="assertive"></p>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
